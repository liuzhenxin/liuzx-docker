services:
  liuzx-ca:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-ca
    image: liuzx-ca:${LIUZX_CA_VERSION}
    env_file:
      - .env
    ports:
      - "4443:4443"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms512m -Xmx512m -Xmn256m
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./logs:/tmp
      - ./data:/home/ca/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/4443'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - ca

networks:
  pki-network:
    external: true
    name: pki-network
