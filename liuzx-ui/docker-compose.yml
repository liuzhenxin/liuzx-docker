services:
  liuzx-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-ui
    image: liuzx-ui:${LIUZX_VERSION:-latest}
    ports:
      - "80:80"
      - "90:90"
    restart: unless-stopped
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./dist:/usr/share/nginx/html
    init: true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      pki-network:
        aliases:
          - ui

networks:
  pki-network:
    external: true
    name: pki-network
