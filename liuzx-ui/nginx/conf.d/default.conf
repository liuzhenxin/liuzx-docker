server {
    listen       80;
    server_name  localhost;

    root /usr/share/nginx/html;

    location / {
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /prod-api/license/ {
        rewrite ^/prod-api/license/(.*)$ /api/$1 break;

        proxy_pass http://liuzx-license:1443;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_buffering off;

        proxy_connect_timeout 90s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    location ^~ /prod-api/ {
        # 1. 严格重写，确保路径精确
        rewrite ^/prod-api/(.*)$ /api-gateway/$1 break;

        # 2. 基础代理
        proxy_pass http://gateway:5555;

        # 3. 核心 Header：必须保留原始请求头
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 4. 关键：禁止 Nginx 修改或缓存 Body
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_buffering off;

        # 5. 延长超时
        proxy_connect_timeout 90s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    error_page 405 =200 $uri;

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
