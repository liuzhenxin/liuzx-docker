services:
  liuzx-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-gateway
    image: liuzx-gateway:${LIUZX_VERSION}
    env_file:
      - .env
    ports:
      - "5555:5555"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - JVM_OPTS=-Xms512m -Xmx512m -Xmn256m
    volumes:
      - ./logs:/tmp
      - ./data:/home/gateway/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/5555'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - gateway

networks:
  pki-network:
    external: true
    name: pki-network
