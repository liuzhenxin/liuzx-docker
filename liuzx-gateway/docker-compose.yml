services:
  liuzx-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-gateway
    image: liuzx-gateway:${LIUZX_GATEWAY_VERSION}
    env_file:
      - .env
    ports:
      - "5555:5555"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - JVM_OPTS=-Xms512m -Xmx512m -Xmn256m
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=Qwe123!!
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=Qwe123!!
      - NACOS_DISCOVERY_ADDRESS=nacos:8848
      - NACOS_CONFIG_ADDRESS=nacos:8848
      - NACOS_NAMESPACE=0dac1a68-2f01-40df-bd26-bf0cb199057a
      - NACOS_GROUP=LIUZX_GROUP
      - NACOS_USERNAME=nacos
      - NACOS_PASSWORD=nacos
      - NACOS_CLUSTER_NAME=${NACOS_CLUSTER_NAME:-pki-cluster}
      - NACOS-DISCOVERY-ADDRESS=nacos:8848
      - NACOS-CONFIG-ADDRESS=nacos:8848
      - NACOS-NAMESPACE=0dac1a68-2f01-40df-bd26-bf0cb199057a
      - NACOS-GROUP=LIUZX_GROUP
      - NACOS-USERNAME=nacos
      - NACOS-PASSWORD=nacos
      - NACOS-CLUSTER-NAME=${NACOS_CLUSTER_NAME:-pki-cluster}
      - SPRING_CLOUD_NACOS_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_USERNAME=nacos
      - SPRING_CLOUD_NACOS_PASSWORD=nacos
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE=0dac1a68-2f01-40df-bd26-bf0cb199057a
      - SPRING_CLOUD_NACOS_DISCOVERY_GROUP=LIUZX_GROUP
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=nacos
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=nacos
      - SPRING_CLOUD_NACOS_DISCOVERY_CLUSTER_NAME=${NACOS_CLUSTER_NAME:-pki-cluster}
      - SPRING_CLOUD_NACOS_CONFIG_CLUSTER_NAME=${NACOS_CLUSTER_NAME:-pki-cluster}
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_NAMESPACE=0dac1a68-2f01-40df-bd26-bf0cb199057a
      - SPRING_CLOUD_NACOS_CONFIG_GROUP=LIUZX_GROUP
      - SPRING_CLOUD_NACOS_CONFIG_USERNAME=nacos
      - SPRING_CLOUD_NACOS_CONFIG_PASSWORD=nacos
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false
    volumes:
      - ./logs:/tmp
      - ./data:/home/gateway/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/5555'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - gateway

networks:
  pki-network:
    external: true
    name: pki-network
