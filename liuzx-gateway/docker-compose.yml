services:
  liuzx-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway
    image: liuzx-gateway:${LIUZX_GATEWAY_VERSION}
    env_file:
      - .env
    ports:
      - "5555:5555"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - JVM_OPTS=-Xms512m -Xmx512m -Xmn256m
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE=0dac1a68-2f01-40df-bd26-bf0cb199057a
      - SPRING_CLOUD_NACOS_DISCOVERY_GROUP=LIUZX_GROUP
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=nacos
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=nacos
      - SPRING_CLOUD_NACOS_DISCOVERY_CLUSTER_NAME=pki-cluster
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_NAMESPACE=0dac1a68-2f01-40df-bd26-bf0cb199057a
      - SPRING_CLOUD_NACOS_CONFIG_GROUP=LIUZX_GROUP
      - SPRING_CLOUD_NACOS_CONFIG_USERNAME=nacos
      - SPRING_CLOUD_NACOS_CONFIG_PASSWORD=nacos
    volumes:
      - ./logs:/tmp
      - ./data:/home/gateway/data
    restart: unless-stopped
    networks:
      - pki-network

networks:
  pki-network:
    external: true
    name: pki-network
