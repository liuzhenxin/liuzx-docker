services:
  liuzx-kmc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-kmc
    image: liuzx-kmc:${LIUZX_KMC_VERSION}
    env_file:
      - .env
    ports:
      - "${KMC_PORT:-3443}:3443"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - JAVA_OPTS=${JAVA_OPTS:--Xms512m -Xmx1024m -Xmn256m}
      - KMC_MASTER_KEY=${KMC_MASTER_KEY}
    volumes:
      - ./logs:/tmp
      - ./data:/home/kmc/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/3443'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - kmc

  liuzx-kmc-db-init:
    image: docker:27-cli
    container_name: liuzx-kmc-db-init
    profiles:
      - init
    environment:
      MYSQL_CONTAINER: "${KMC_DB_MYSQL_CONTAINER:-liuzx-mysql}"
      MYSQL_USER: "${KMC_DB_USER:-root}"
      MYSQL_PASSWORD: "${KMC_DB_PASSWORD:-11111111}"
      KMC_DB_NAME: "${KMC_DB_NAME:-lcloud_kmc_4}"
      PLATFORM_DB_NAME: "${PLATFORM_DB_NAME:-lcloud_platform_4}"
      INIT_DIR: /kmc-db-init
    volumes:
      - ./scripts/init-kmc-db.sh:/usr/local/bin/init-kmc-db.sh:ro
      - ./mysql/init:/kmc-db-init:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["/bin/sh", "/usr/local/bin/init-kmc-db.sh"]
    init: true
    restart: "no"
    network_mode: none

networks:
  pki-network:
    external: true
    name: pki-network
