services:
  redis:
    image: redis:8.2
    container_name: liuzx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: "${REDIS_PASSWORD:-passw0rd}"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-passw0rd}
    volumes:
      - ./data:/data
    init: true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-passw0rd}\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      pki-network:
        aliases:
          - redis

networks:
  pki-network:
    external: true
    name: pki-network
