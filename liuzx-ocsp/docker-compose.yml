services:
  liuzx-ocsp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-ocsp
    image: liuzx-ocsp:${LIUZX_OCSP_VERSION}
    env_file:
      - .env
    ports:
      - "${OCSP_PORT:-10444}:10444"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - JAVA_OPTS=${JAVA_OPTS:--Xms512m -Xmx1024m -Xmn256m}
      - SERVER_PORT=10444
      - SERVICE_ID=liuzx-ocsp
      - NODE_ID=${NODE_ID:-1}
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-lcloud_ocsp}
      - MYSQL_USERNAME=${MYSQL_USERNAME:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - NACOS_DISCOVERY_ENABLED=${NACOS_DISCOVERY_ENABLED:-false}
      - NACOS_CONFIG_ENABLED=${NACOS_CONFIG_ENABLED:-false}
      - NACOS_ADDRESS=${NACOS_ADDRESS:-nacos:8848}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-0dac1a68-2f01-40df-bd26-bf0cb199057a}
      - NACOS_GROUP=${NACOS_GROUP:-LIUZX_GROUP}
      - NACOS_USERNAME=${NACOS_USERNAME:-nacos}
      - NACOS_PASSWORD=${NACOS_PASSWORD:-nacos}
      - NACOS_CLUSTER_NAME=${NACOS_CLUSTER_NAME:-pki-cluster}
      - SPRING_CLOUD_BOOTSTRAP_ENABLED=false
      - SPRING_CONFIG_LOCATION=file:/app/application.yml
    volumes:
      - ./logs:/tmp
      - ./data:/home/ocsp/data
      - ./application.yml:/app/application.yml:ro
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/10444'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - ocsp
          - liuzx-ocsp

networks:
  pki-network:
    external: true
    name: pki-network
