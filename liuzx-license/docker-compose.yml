services:
  liuzx-license-db-init:
    image: docker:27-cli
    container_name: liuzx-license-db-init
    environment:
      MYSQL_CONTAINER: "${LICENSE_DB_MYSQL_CONTAINER:-liuzx-mysql}"
      MYSQL_USER: "${LICENSE_DB_USER:-root}"
      MYSQL_PASSWORD: "${LICENSE_DB_PASSWORD:-11111111}"
      LICENSE_DB_NAME: "${LICENSE_DB_NAME:-lcloud_license_4}"
      PLATFORM_DB_NAME: "${PLATFORM_DB_NAME:-lcloud_platform_4}"
      INIT_DIR: /license-db-init
    volumes:
      - ./scripts/init-license-db.sh:/usr/local/bin/init-license-db.sh:ro
      - ./mysql/init:/license-db-init:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["/bin/sh", "/usr/local/bin/init-license-db.sh"]
    init: true
    restart: "no"
    network_mode: none

  liuzx-license:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-license
    image: liuzx-license:${LIUZX_VERSION}
    env_file:
      - .env
    ports:
      - "1443:1443"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms512m -Xmx512m -Xmn256m
      - SPRING_CLOUD_NACOS_CONFIG_IMPORT_CHECK_ENABLED=false
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE=0dac1a68-2f01-40df-bd26-bf0cb199057a
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=nacos
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=nacos
      - SPRING_CLOUD_NACOS_DISCOVERY_GROUP=LIUZX_GROUP
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_NAMESPACE=0dac1a68-2f01-40df-bd26-bf0cb199057a
      - SPRING_CLOUD_NACOS_CONFIG_USERNAME=nacos
      - SPRING_CLOUD_NACOS_CONFIG_PASSWORD=nacos
      - SPRING_CLOUD_NACOS_CONFIG_GROUP=LIUZX_GROUP
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME=root
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD=${LICENSE_DB_PASSWORD}
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_DOMAIN_USERNAME=root
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_DOMAIN_PASSWORD=${LICENSE_DB_PASSWORD}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_REDISSON_PASSWORD=${REDIS_PASSWORD}
      - SPRING_REDISSON_NODE_SINGLE_ADDRESS=redis://redis:6379
    depends_on:
      liuzx-license-db-init:
        condition: service_completed_successfully
    volumes:
      - ./logs:/tmp
      - ./data:/home/license/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/1443'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - license

networks:
  pki-network:
    external: true
    name: pki-network
