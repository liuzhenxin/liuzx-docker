services:
  liuzx-license:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-license
    image: liuzx-license:${LIUZX_LICENSE_VERSION}
    env_file:
      - .env
    ports:
      - "1443:1443"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms512m -Xmx512m -Xmn256m
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_REDISSON_PASSWORD=${REDIS_PASSWORD}
      - SPRING_REDISSON_NODE_SINGLE_ADDRESS=redis://redis:6379
    volumes:
      - ./logs:/tmp
      - ./data:/home/license/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/1443'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - license

networks:
  pki-network:
    external: true
    name: pki-network
