services:
  # --- 消息队列：Kafka (KRaft) ---
  kafka:
    image: apache/kafka:latest
    container_name: liuzx-kafka
    restart: unless-stopped
    networks:
      pki-network:
        aliases:
          - kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:19092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_HEAP_OPTS=-Xmx512M -Xms512M
      # ⚠️⚠️⚠️ 单节点必须强制降级副本数，否则消费者无法使用 ⚠️⚠️⚠️
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    ports:
      - "19092:19092"
    volumes:
      - ./data:/var/lib/kafka/data
    init: true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/9092'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --- 可视化：Kafka UI ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: liuzx-kafka-ui
    restart: unless-stopped
    networks:
      pki-network:
        aliases:
          - kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    init: true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  pki-network:
    external: true
    name: pki-network
