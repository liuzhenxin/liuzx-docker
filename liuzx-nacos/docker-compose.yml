services:
  liuzx-nacos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-nacos
    image: liuzx-nacos:${LIUZX_NACOS_VERSION}
    env_file:
      - .env
    ports:
      - "8848:8848"
      - "8048:8048"
      - "9848:9848"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - MODE=standalone
      - PREFER_HOST_MODE=nacos
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -XX:+IgnoreUnrecognizedVMOptions --add-opens=java.base/java.util=ALL-UNNAMED -Dfile.encoding=UTF-8 -Djava.security.egd=file:/dev/urandom
      - NACOS_OPTS=
    volumes:
      - ./logs:/tmp
      - ./data:/home/nacos/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/8848'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - nacos

networks:
  pki-network:
    external: true
    name: pki-network
