services:
  liuzx-nacos-db-init:
    image: docker:27-cli
    container_name: liuzx-nacos-db-init
    env_file:
      - .env
    environment:
      MYSQL_CONTAINER: "${NACOS_DB_MYSQL_CONTAINER:-liuzx-mysql}"
      MYSQL_USER: "${NACOS_DB_USER:-root}"
      MYSQL_PASSWORD: "${NACOS_DB_PASSWORD:-11111111}"
      NACOS_DB_NAME: "${NACOS_DB_NAME:-lcloud_platform_nacos_3}"
      INIT_DIR: /nacos-db-init
    volumes:
      - ./scripts/init-nacos-db.sh:/usr/local/bin/init-nacos-db.sh:ro
      - ./mysql/init:/nacos-db-init:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["/bin/sh", "/usr/local/bin/init-nacos-db.sh"]
    init: true
    restart: "no"
    network_mode: none

  liuzx-nacos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-nacos
    image: liuzx-nacos:${LIUZX_NACOS_VERSION}
    env_file:
      - .env
    ports:
      - "8848:8848"
      - "8048:8048"
      - "9848:9848"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - MODE=standalone
      - PREFER_HOST_MODE=nacos
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -XX:+IgnoreUnrecognizedVMOptions --add-opens=java.base/java.util=ALL-UNNAMED -Dfile.encoding=UTF-8 -Djava.security.egd=file:/dev/urandom
      - JVM_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -XX:+IgnoreUnrecognizedVMOptions --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED -Dfile.encoding=UTF-8 -Djava.security.egd=file:/dev/urandom
      - NACOS_OPTS=
      - DB_PASSWORD_0=${NACOS_DB_PASSWORD:-11111111}
    depends_on:
      liuzx-nacos-db-init:
        condition: service_completed_successfully
    volumes:
      - ./logs:/tmp
      - ./data:/home/nacos/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/8848'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - nacos

networks:
  pki-network:
    external: true
    name: pki-network
