services:
  liuzx-snowflake-id:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liuzx-snowflake-id
    image: liuzx-snowflake-id:${LIUZX_SNOWFLAKE_ID_VERSION}
    env_file:
      - .env
    ports:
      - "${SNOWFLAKE_ID_PORT:-9094}:9094"
      - "${SNOWFLAKE_ID_GRPC_PORT:-19094}:19094"
    environment:
      - LANG=zh_CN.UTF-8
      - TZ=Asia/Shanghai
      - JAVA_OPTS=${JAVA_OPTS:--Xms256m -Xmx512m -XX:TieredStopAtLevel=1}
      - SERVER_PORT=9094
      - GRPC_PORT=19094
      - SERVICE_ID=liuzx-snowflake-id
      - NACOS_DISCOVERY_ADDRESS=${NACOS_DISCOVERY_ADDRESS:-nacos:8848}
      - NACOS_CONFIG_ADDRESS=${NACOS_CONFIG_ADDRESS:-nacos:8848}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-0dac1a68-2f01-40df-bd26-bf0cb199057a}
      - NACOS_GROUP=${NACOS_GROUP:-LIUZX_GROUP}
      - NACOS_USERNAME=${NACOS_USERNAME:-nacos}
      - NACOS_PASSWORD=${NACOS_PASSWORD:-nacos}
      - NACOS_CLUSTER_NAME=${NACOS_CLUSTER_NAME:-pki-cluster}
      - SPRING_CLOUD_NACOS_DISCOVERY_CLUSTER_NAME=${NACOS_CLUSTER_NAME:-pki-cluster}
      - SPRING_CLOUD_NACOS_CONFIG_CLUSTER_NAME=${NACOS_CLUSTER_NAME:-pki-cluster}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://auth:1111/api/v1/oauth2/jwks
    volumes:
      - ./logs:/tmp
      - ./data:/home/snowflake-id/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/19094'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pki-network:
        aliases:
          - snowflake-id
          - liuzx-snowflake-id

networks:
  pki-network:
    external: true
    name: pki-network
